# TV Time Archive Viewer — static site, no build step.
# The app lives in viewer/, which is what Netlify publishes.

[build]
  publish = "viewer"
  command = ""

# Sensible defaults for a static, client-only app.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    X-Frame-Options = "DENY"
